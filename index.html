<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PHANTOM</title>

<style>
body {
  background: #0a0a0f;
  color: white;
  font-family: sans-serif;
  margin: 0;
}

.container {
  padding: 20px;
}

.persona-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.persona-card {
  border: 1px solid #2a2a38;
  padding: 16px;
  cursor: pointer;
  transition: 0.2s;
  -webkit-tap-highlight-color: transparent;
}

.persona-card.active {
  border-color: #00e5ff;
  background: rgba(0,229,255,0.1);
}

button {
  margin-top: 20px;
  padding: 14px;
  width: 100%;
  font-size: 16px;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="container">

<h2>PHANTOM</h2>

<div class="persona-grid">
  <div class="persona-card active" data-persona="cto">CTO</div>
  <div class="persona-card" data-persona="pm">PM</div>
  <div class="persona-card" data-persona="ux">UX</div>
  <div class="persona-card" data-persona="founder">Founder</div>
</div>

<button onclick="startTest()">▶ Deploy Agent</button>
<button onclick="autoFix()">⚡ Auto Fix (GitHub)</button>

</div>

<script>
// FIXED PERSONA CLICK
document.querySelectorAll('.persona-card').forEach(card => {
  card.addEventListener('click', () => {
    document.querySelectorAll('.persona-card').forEach(c => {
      c.classList.remove('active');
    });
    card.classList.add('active');
  });
});

// TEST BUTTON WORKS
function startTest() {
  const active = document.querySelector('.persona-card.active');
  alert("Running test as: " + active.dataset.persona);
}

// GITHUB AUTO FIX (CLIENT DEMO)
async function autoFix() {
  const token = prompt("GitHub Token");
  const owner = prompt("Repo Owner");
  const repo = prompt("Repo Name");

  const branch = "phantom-fix-" + Date.now();

  const filePath = "index.html";

  const content = btoa("<h1>Updated by PHANTOM</h1>");

  // create branch
  const base = await fetch(`https://api.github.com/repos/${owner}/${repo}/git/ref/heads/main`, {
    headers: { Authorization: `token ${token}` }
  }).then(r => r.json());

  await fetch(`https://api.github.com/repos/${owner}/${repo}/git/refs`, {
    method: "POST",
    headers: {
      Authorization: `token ${token}`,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      ref: `refs/heads/${branch}`,
      sha: base.object.sha
    })
  });

  // commit file
  await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${filePath}`, {
    method: "PUT",
    headers: {
      Authorization: `token ${token}`,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      message: "phantom auto fix",
      content,
      branch
    })
  });

  // create PR
  const pr = await fetch(`https://api.github.com/repos/${owner}/${repo}/pulls`, {
    method: "POST",
    headers: {
      Authorization: `token ${token}`,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      title: "PHANTOM Auto Fix",
      head: branch,
      base: "main"
    })
  }).then(r => r.json());

  alert("PR Created: " + pr.html_url);
}
</script>

</body>
</html>
